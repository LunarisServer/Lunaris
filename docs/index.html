<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunaris</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header glass">
    <a class="brand" href="#slide-hero">
      <img src="./assets/L.png" alt="Lunaris" />
      <span>Lunaris</span>
    </a>
    <nav>
      <a href="#slide-hero">トップ</a>
      <a href="#slide-start">スタート画面</a>
      <a href="#slide-make">サーバー作成</a>
      <a href="#slide-editor">操作画面</a>
      <a href="#slide-plugin">プラグイン</a>
    </nav>
    <a class="header-download" href="https://cdn.discordapp.com/attachments/1496428610331082913/1496428690119065600/Lunaris-Setup.exe?ex=69e9d952&is=69e887d2&hm=3fb02e59025f6ee334268facedcdd28280afad33d1453e51138bd96bd55b025c&">Download</a>
  </header>

  <main class="slides" id="slidesRoot">
    <section class="slide hero-slide" id="slide-hero">
      <div class="slide-inner hero-center">
        <h1 class="hero-title">Lunaris</h1>
        <p class="lead hero-lead">あなたのサーバー作成をより簡単に</p>
        <a class="btn primary big hero-download" href="https://cdn.discordapp.com/attachments/1496428610331082913/1496428690119065600/Lunaris-Setup.exe?ex=69e9d952&is=69e887d2&hm=3fb02e59025f6ee334268facedcdd28280afad33d1453e51138bd96bd55b025c&">今すぐダウンロード</a>
      </div>
    </section>

    <section class="slide info-slide" id="slide-start">
      <div class="slide-inner split">
        <div class="copy glass">
          <h2 class="section-title-gradient">スタート画面はシンプルに</h2>
          <p class="lead">これ以上迷う必要はありません。見やすいUIで簡単に操作ができます。</p>
        </div>
        <div class="shot glass">
          <img src="./assets/start.png" alt="Lunaris start screen" />
        </div>
      </div>
    </section>

    <section class="slide info-slide" id="slide-make">
      <div class="slide-inner split">
        <div class="copy glass">
          <h2 class="section-title-gradient">あっというまなサーバー作成</h2>
          <p class="lead">最短、1クリックでサーバー作成。ほかにはない速さ。</p>
        </div>
        <div class="shot glass">
          <img src="./assets/make.png" alt="Lunaris create wizard" />
        </div>
      </div>
    </section>

    <section class="slide info-slide" id="slide-editor">
      <div class="slide-inner split">
        <div class="copy glass">
          <h2 class="section-title-gradient">サーバー操作は簡単です</h2>
          <p class="lead">簡単にサーバーを管理することができます。これ以上調べたりする必要はありません！！</p>
        </div>
        <div class="shot glass">
          <img src="./assets/editer.png" alt="Lunaris editor screen" />
        </div>
      </div>
    </section>

    <section class="slide info-slide" id="slide-plugin">
      <div class="slide-inner split">
        <div class="copy glass">
          <h2 class="section-title-gradient">プラグイン？そんなの簡単</h2>
          <p class="lead">webで検索してダウンロードをする必要なんてありません！1クリックでダウンロードして使うことができます。</p>
        </div>
        <div class="shot glass">
          <img src="./assets/plu.png" alt="Lunaris plugin screen" />
        </div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
